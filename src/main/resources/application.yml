server:
  port: 8086
  forward-headers-strategy: framework
  description: Quartz 定时任务与 HTTP 平台任务

spring:
  application:
    name: peach-job-service
    module-code: JOB0
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:192.168.99.100:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: ${NACOS_NAMESPACE:dev}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        ip: ${NACOS_REGISTER_IP:}
        port: ${NACOS_REGISTER_PORT:${server.port}}
        fail-fast: false
  datasource:
    url: ${JOB_DB_URL:jdbc:postgresql://192.168.99.100:5432/peach_job?currentSchema=public}
    username: ${JOB_DB_USERNAME:postgres}
    password: ${JOB_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
  sql:
    init:
      mode: never
  quartz:
    job-store-type: jdbc
    overwrite-existing-jobs: true
    jdbc:
      initialize-schema: never
    properties:
      org.quartz.scheduler.instanceName: peachJobScheduler
      org.quartz.scheduler.instanceId: AUTO
      org.quartz.threadPool.class: org.quartz.simpl.SimpleThreadPool
      org.quartz.threadPool.threadCount: "8"
      org.quartz.jobStore.driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
      org.quartz.jobStore.tablePrefix: QRTZ_
      org.quartz.jobStore.isClustered: "false"
      org.quartz.jobStore.useProperties: "false"

mybatis:
  type-aliases-package: org.peach.job.domain
  type-handlers-package: org.peach.job.mybatis
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

peach:
  job:
    http-executor:
      core-pool-size: 16
      max-pool-size: 32
      queue-capacity: 256
      thread-name-prefix: job-http-
      await-termination-seconds: 60
